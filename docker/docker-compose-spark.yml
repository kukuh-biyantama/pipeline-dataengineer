services:
  spark-master:
    container_name: spark-master
    hostname: spark-master
    image: bitnami/spark:3.5

    environment:
      - SPARK_MODE=master

    volumes:
      - ../spark-scripts:/spark-scripts
      - ../scripts:/scripts

    ports:
      - "8090:8080"
      - "7077:7077"

  spark-worker-1:
    container_name: spark-worker-1
    image: bitnami/spark:3.5

    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1

    volumes:
      - ../spark-scripts:/spark-scripts
      - ../scripts:/scripts

    depends_on:
      - spark-master

  spark-worker-2:
    container_name: spark-worker-2
    image: bitnami/spark:3.5

    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1

    volumes:
      - ../spark-scripts:/spark-scripts
      - ../scripts:/scripts

    depends_on:
      - spark-master

networks:
  default:
    name: dataeng-network
    external: true
